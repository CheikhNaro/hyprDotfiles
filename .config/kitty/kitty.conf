# kitty.conf
# Structure : kitty.conf + globals.conf + theme.conf + scripts/

# ─── Inclusions ───────────────────────────────────────────────────
include globals.conf
include theme.conf

# ─── Police ───────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Bold
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        13.0

# Fallbacks pour symboles, CJK, etc.
symbol_map U+E000-U+F8FF JetBrainsMono Nerd Font
symbol_map U+1F300-U+1FAFF Noto Sans Symbols 2
symbol_map U+4E00-U+9FFF Noto Sans CJK SC

# ─── Curseur ──────────────────────────────────────────────────────
cursor_shape             beam
cursor_beam_thickness   3.0
cursor_underline_thickness 2.0
cursor_blink_interval    0.2
cursor_stop_blinking_after 0
cursor_trail              3
cursor_trail_decay        0.1 0.3
cursor_trail_start_threshold 2

# ─── Scrollback ───────────────────────────────────────────────────
scrollback_lines         10000

# ─── Souris ───────────────────────────────────────────────────────
mouse_hide_wait          0
# (0 = ne jamais cacher — équivalent WezTerm hide_mouse_cursor_when_typing = false)

# ─── Fenêtre ──────────────────────────────────────────────────────
background_opacity       0.95
dynamic_background_opacity yes
enabled_layouts splits

window_padding_width     0
window_margin_width      0

# Pas de décorations (équivalent window_decorations = "NONE")
hide_window_decorations  yes

confirm_os_window_close  0

remember_window_size     no
initial_window_width     90c
initial_window_height    25c

# ─── Onglets ──────────────────────────────────────────────────────
tab_bar_edge             bottom
tab_bar_style            separator
tab_separator            " │ "
tab_title_template       "{index}: {title}"
scrollbar_width 0

# Cacher la tab bar si un seul onglet
tab_bar_min_tabs         2

# ─── Wayland ──────────────────────────────────────────────────────
linux_display_server     wayland
# wayland_titlebar_color   background
enable_audio_bell no
window_alert_on_bell no

# ─── Performances ─────────────────────────────────────────────────
repaint_delay            8
input_delay              1
sync_to_monitor          yes

# ─── Raccourcis clavier ───────────────────────────────────────────

# Désactiver tous les raccourcis par défaut de Kitty (table rase)
clear_all_shortcuts      no

# Thème switcher
map ctrl+shift+t         launch --type=overlay --hold sh -c "$HOME/.config/kitty/scripts/theme_switcher.sh"

# Taille de police
map alt+i                change_font_size all +1.0
map alt+o                change_font_size all -1.0
map ctrl+0               change_font_size all 0

# Presse-papiers
map ctrl+c               copy_to_clipboard
map ctrl+v               paste_from_clipboard
# Ctrl+C signal (quand pas de sélection)
map ctrl+shift+c         send_text all \x03

# Onglets
map ctrl+t               new_tab_with_cwd
map ctrl+page_up         previous_tab
map ctrl+page_down       next_tab
map ctrl+shift+q         close_tab

# Splits / fenêtres
map ctrl+shift+enter     launch --location=vsplit
map ctrl+shift+]         next_window
map ctrl+shift+[         previous_window

# Nouvelle fenêtre OS
map super+k              new_os_window_with_cwd

# Recherche (scrollback)
map ctrl+f               show_scrollback


# BEGIN_KITTY_THEME
# Gruvbox Dark Hard
include current-theme.conf
# END_KITTY_THEME
