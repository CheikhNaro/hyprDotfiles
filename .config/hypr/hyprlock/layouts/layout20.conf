$wallpapers = $HOME/.config/hypr/hyprlock/wallpapers

# BACKGROUND
background {
    monitor =
    path = $HOME/.cache/current-wallpaper
    blur_passes = 4
    blur_size = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    disable_loading_bar = false
    grace = 1
}

# --- LEFT COLUMN ---

# LOGIN CARD
shape {
    monitor =
    size = 360, 380
    color = $bg
    rounding = 25
    border_size = 0
    position = -200, 160
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] hostname
    color = $text_dim
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -200, 300
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = Log in
    color = $text
    font_size = 42
    font_family = JetBrainsMono Nerd Font
    position = -200, 240
    halign = center
    valign = center
    zindex = 2
}

# Username Display
shape {
    monitor =
    size = 300, 70
    color = $accent
    rounding = 20
    position = -200, 130
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = username
    color = $on_accent
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = -328, 150
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$USER</b>"
    color = $on_accent
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = -290, 115
    halign = center
    valign = center
    zindex = 3
}

# Password Input
label {
    monitor =
    text = 
    color = rgb(0, 0, 0)
    font_size = 8
    font_family = JetBrainsMono Nerd Font
    position = -315, 60
    halign = center
    valign = center
    zindex = 3
}

input-field {
    monitor =
    size = 320, 70
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = false
    outer_color = rgba(0, 0, 0, 0)
    inner_color = $accent
    font_color = $on_accent
    fade_on_empty = false
    placeholder_text = Type your Password
    hide_input = false
    rounding = 20
    position = -200, 40
    halign = center
    valign = center
    zindex = 2
}

# CLOCK CARD
shape {
    monitor =
    size = 360, 160
    color = $bg
    rounding = 25
    position = -200, -140
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%H:%M</b>"
    color = $text
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = -200, -125
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = And الله is the best of planners
    color = $text_dim
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -200, -195
    halign = center
    valign = center
    zindex = 2
}


# --- RIGHT COLUMN ---

# PROFILE CARD (Blurred)
shape {
    monitor =
    size = 360, 380
    color = $bg
    rounding = 25
    position = 200, 160
    halign = center
    valign = center
    zindex = 1
}

image {
    monitor =
    path = $wallpapers/user.jpg
    size = 120
    rounding = 20
    border_size = 4
    border_color = $accent
    position = 200, 260
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%a" | tr '[:lower:]' '[:upper:]')</b>"
    color = $text
    font_size = 38
    font_family = JetBrainsMono Nerd Font
    position = 200, 150
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] date +"%d %B, %Y"
    color = $text_dim
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 200, 100
    halign = center
    valign = center
    zindex = 11
}

# SYSTEM/MEDIA STATUS CARD
shape {
    monitor =
    size = 360, 320
    color = $bg
    rounding = 25
    position = 200, -140
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
    zindex = 10
}

# Media Info
label {
    monitor =
    text = cmd[update:1000] player=$(playerctl -l 2>/dev/null | head -n 1); if [ "$player" = "spotify" ]; then echo " <b> </b> "; elif [ -n "$player" ]; then echo "  "; else echo " 󰎆 "; fi
    color = $text
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 200, -10
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text = cmd[update:1000] title=$(playerctl metadata xesam:title 2>/dev/null | cut -c1-24); if [ -z "$title" ]; then echo "No Music Playing"; else echo "$title"; fi
    color = $text
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 200, -40
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text = cmd[update:1000] artist=$(playerctl metadata xesam:artist 2>/dev/null | cut -c1-30); if [ -z "$artist" ]; then echo ""; else echo "$artist"; fi
    color = $text_dim
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 200, -60
    halign = center
    valign = center
    zindex = 11
}

# Connectivity Buttons
shape {
    monitor =
    size = 150, 75
    color = $accent
    rounding = 20
    position = 115, -130
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text =  <b> </b>
    color = $on_accent
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 115, -120
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] wifi=$(iw dev 2>/dev/null | awk '$1=="ssid"{print $2}' | head -n 1 | cut -c1-14); if [ -z "$wifi" ]; then echo "Disconnected"; else echo "$wifi"; fi
    color = $on_accent
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 115, -145
    halign = center
    valign = center
    zindex = 12
}

shape {
    monitor =
    size = 150, 75
    color = $accent
    rounding = 20
    position = 285, -130
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text =  <b> </b>
    color = $on_accent
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 285, -120
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] bt=$(bluetoothctl info 2>/dev/null | grep "Name:" | cut -d ' ' -f 2- | cut -c 1-14); if [ -z "$bt" ]; then echo "Disconnected"; else echo "$bt"; fi
    color = $on_accent
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 285, -145
    halign = center
    valign = center
    zindex = 12
}

# Battery Bar
shape {
    monitor =
    size = 320, 100
    color = $accent
    rounding = 25
    position = 200, -235
    halign = center
    valign = center
    zindex = 11
}

# Battery Inner icon block
shape {
    monitor =
    size = 100, 20
    color = $on_accent
    rounding = 5
    position = 200, -205
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] status=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null); if [ "$status" = "Discharging" ]; then echo " <b>!</b> "; else echo " <b>󰚥</b> "; fi
    color = $accent
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 200, -205
    halign = center
    valign = center
    zindex = 13
}

label {
    monitor =
    text = cmd[update:1000] cat /sys/class/power_supply/BAT0/capacity | sed 's/.*/<b>&%<\/b>/'
    color = $on_accent
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 200, -235
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] cat /sys/class/power_supply/BAT0/status
    color = $on_accent
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 200, -265
    halign = center
    valign = center
    zindex = 12
}
