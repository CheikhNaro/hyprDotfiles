$wall = $HOME/.config/hypr/hyprlock/wallpapers/5.png
# $wall = $HOME/.config/hypr/hyprlock/wallpapers/hyprlock.png
source = $HOME/.config/hypr/hyprlock/fonts/SF Pro Display Bold
# source = $HOME/.config/hypr/hyprlock/fonts/SF Pro Display Bold
# BACKGROUND
background {
    monitor =
    path = $HOME/.cache/current-wallpaper
    blur_passes = 4
    blur_size = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Profile-Photo
image {
    monitor =
    path = $HOME/.config/hypr/hyprlock/wallpapers/user.jpg
    border_size = 2
    border_color = $accent
    size = 120
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 25, 190
    halign = center
    valign = center
}

# NAME
label {
    monitor =
    text = $USER
    color = $text
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 20
    font_family = SF Pro Display Bold
    position = 25, 80
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $text
    font_size = 60
    font_family = SF Pro Display Bold
    position = 30, -20
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $text
    font_size = 19
    font_family = SF Pro Display Bold
    position = 35, -90
    halign = center
    valign = center
}


# USER-BOX
shape {
    monitor =
    size = 320, 55
    color = $bg
    rounding = -1
    border_size = 0
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 34, -190
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =     $USER
    color = $text
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    font_family = SF Pro Display Bold
    position = 38, -190
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = $accent
    font_color = $text
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">   Enter Pass</span></i>
    hide_input = false
    position = 34, -268
    halign = center
    valign = center
}
